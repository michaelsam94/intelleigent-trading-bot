# fly.toml — intelleigent-trading-bot-sjkfow (eth_ta_telegram worker, Amsterdam).
# - Build must use Docker, not Paketo: requirements.txt pulls xgboost → cmake missing.
# - Use ./Dockerfile (symlink → Dockerfile.railway-eth-ta). Fly often ignores custom
#   dockerfile paths and falls back to buildpacks; a root Dockerfile forces docker build.
# - No [http_service] / PORT: this process does not listen on HTTP; only outbound Telegram/Binance.
#   If you add a public health endpoint later, restore http_service + a listener on internal_port.
#
# https://fly.io/docs/reference/configuration/

app = 'intelleigent-trading-bot-sjkfow'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

kill_signal = 'SIGTERM'
kill_timeout = 120

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
